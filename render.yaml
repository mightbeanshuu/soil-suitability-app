services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: soil-suitability-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      # This specifies that a GOOGLE_API_KEY is required.
      # You will paste the secret key into the Render dashboard during deployment.
      - key: GOOGLE_API_KEY
        sync: false 
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend Service (Vite + React)
  - type: web
    name: soil-suitability-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    plan: free
    # Fixes routing for React Single Page Applications
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
